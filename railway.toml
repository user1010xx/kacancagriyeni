# Railway Config as Code
# Schema for VS Code validation + autocomplete
# $schema = "https://railway.com/railway.schema.json"

[build]
builder = "nixpacks"

[deploy]
startCommand = "python bot.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

# ------------------------------------------------------------
